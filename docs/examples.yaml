examples_readme:
  readme_template: docs/example_readme.md
  skip_examples: []
  code_snippet_files:
    additional: []
  template_vars:
    production_considerations_comment: ""
    production_considerations: ""
    skip_if_name_contains: []
  versions_tf:
    add: |
      provider "mongodbatlas" {}
      provider "aws" {
        region = var.aws_region
      }
    skip_if_name_contains: []
    generate_when_missing_only: false
    force_generate: false

tables:
  - name: Examples
    columns: ["feature", "name"]
    link_column: name
    example_rows:
    - folder_name: encryption
      feature: Encryption at Rest
      name: AWS KMS Integration
      description: Configures Atlas encryption at rest with a module-managed AWS KMS key, including automatic key rotation.
    - folder_name: encryption_private_endpoint
      feature: Encryption at Rest
      name: AWS KMS Integration with Private Endpoint
      description: Extends encryption at rest with KMS private endpoints so Atlas-to-KMS traffic stays on the AWS backbone.
    - folder_name: privatelink
      feature: Private Link
      name: AWS PrivateLink Endpoint
      description: Creates a single-region AWS PrivateLink endpoint connecting your VPC to Atlas.
    - folder_name: privatelink_multi_region
      feature: Private Link
      name: AWS PrivateLink Multi-Region
      description: Creates PrivateLink endpoints in two AWS regions with Atlas regional mode enabled.
    - folder_name: privatelink_byoe
      feature: Private Link
      name: AWS PrivateLink BYOE
      description: Demonstrates the Bring-Your-Own-Endpoint pattern where you manage the VPC endpoint and the module manages the Atlas-side service.
    - folder_name: privatelink_cross_region
      feature: Private Link
      name: AWS PrivateLink Cross-Region
      description: Creates a cross-region PrivateLink endpoint where a VPC in one region connects to an Atlas endpoint service in another.
    - folder_name: privatelink_byoe_cross_region
      feature: Private Link
      name: AWS PrivateLink BYOE Cross-Region
      description: Combines BYOE with cross-region PrivateLink for full endpoint control across regions.
    - folder_name: backup_export
      feature: Backup Export
      name: S3 Bucket Export
      description: Configures Atlas Cloud Backup export to a module-managed S3 bucket with lifecycle rules.
    - folder_name: aws_read_only
      feature: BYO Role
      name: AWS Read Only
      description: Uses a pre-existing IAM role with skip_iam_policy_attachments for environments where the module has no AWS write access.
    - folder_name: log_integration
      feature: Log Integration
      name: S3 Log Export
      description: Exports Atlas operational and audit logs to a module-managed S3 bucket.
